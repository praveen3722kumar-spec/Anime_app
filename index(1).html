<!DOCTYPE html>
<html>
<head>
  <title>AnimeHub</title>
  <style>
    body { background:#0f172a; color:white; font-family:sans-serif; }
    .anime { border:1px solid #444; padding:10px; margin:10px; }
    img { width:150px; }
  </style>
</head>
<body>

<h1>AnimeHub</h1>
<div id="animeList"></div>

<script>
fetch("https://api.jikan.moe/v4/top/anime")
.then(res => res.json())
.then(data => {
  let list = document.getElementById("animeList");
  data.data.slice(0,10).forEach(anime => {
    list.innerHTML += `
      <div class="anime">
        <h3>${anime.title}</h3>
        <img src="${anime.images.jpg.image_url}">
        <p>⭐ ${anime.score}</p>
      </div>
    `;
  });
});
</script>

</body>
</html>
